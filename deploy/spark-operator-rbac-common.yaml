# RBAC for SparkOperator in common namespace
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: spark-operator
  namespace: common
rules:
- apiGroups:
  - ""
  resources:
  - pods
  - services
  - configmaps
  verbs:
  - get
  - list
  - watch
  - create
  - update
  - patch
  - delete

- apiGroups:
  - ""
  resources:
  - pods/log
  verbs:
  - get

- apiGroups:
  - ""
  resources:
  - pods/exec
  verbs:
  - create

- apiGroups:
  - ""
  resources:
  - pods/status
  - services/status
  verbs:
  - get
  - update

- apiGroups:
  - sparkoperator.k8s.io
  resources:
  - sparkapplications
  - scheduledsparkapplications
  - sparkconnects
  verbs:
  - get
  - list
  - watch
  - create
  - update
  - patch
  - delete

- apiGroups:
  - sparkoperator.k8s.io
  resources:
  - sparkapplications/status
  - scheduledsparkapplications/status
  verbs:
  - get
  - update
  - patch

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: spark-operator
  namespace: common
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: spark-operator
subjects:
- kind: ServiceAccount
  name: spark-operator-controller
  namespace: default
